<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>材料加工 · 记忆宫殿</title>
<style>
:root{
--bg:#060613;--surf:#0e0e26;--surf2:#161638;--surf3:#1e1e48;
--pri:#7c5cfc;--prisoft:#9b85fc;--priglow:rgba(124,92,252,.3);
--grn:#34d399;--grnsoft:rgba(52,211,153,.15);--red:#f87171;--redsoft:rgba(248,113,113,.12);
--amb:#fbbf24;--ambsoft:rgba(251,191,36,.12);
--cyan:#22d3ee;--cyansoft:rgba(34,211,238,.1);
--pink:#f472b6;--pinksoft:rgba(244,114,182,.1);
--txt:#e8eaf0;--txt2:#b0b4c4;--txt3:#7278a0;
--border:#28285a;--rad:16px;--rads:12px;
--font:-apple-system,'PingFang SC','Microsoft YaHei',system-ui,sans-serif;
--safe-bottom:env(safe-area-inset-bottom,12px);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html{scroll-behavior:smooth}
body{font-family:var(--font);background:var(--bg);color:var(--txt);min-height:100vh;min-height:100dvh;overflow-x:hidden;-webkit-font-smoothing:antialiased;-webkit-user-select:none;user-select:none}
.topbar{position:sticky;top:0;z-index:100;background:rgba(6,6,19,.92);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border-bottom:1px solid var(--border);padding:12px 16px;display:flex;align-items:center;justify-content:space-between}
.topbar .logo{font-size:1.1rem;font-weight:800;background:linear-gradient(135deg,var(--prisoft),var(--pink));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.topbar .mode-row{display:flex;gap:4px}
.topbar .mbtn{width:34px;height:34px;border-radius:10px;border:1.5px solid var(--border);background:rgba(20,20,50,.6);display:flex;align-items:center;justify-content:center;font-size:1rem;cursor:pointer;transition:all .2s}
.topbar .mbtn.active{border-color:var(--pri);background:rgba(124,92,252,.2);box-shadow:0 0 14px var(--priglow)}
.content{padding:12px 14px calc(80px + var(--safe-bottom))}
.sub-chips{display:flex;gap:8px;overflow-x:auto;padding:4px 0 14px;scrollbar-width:none;-ms-overflow-style:none}
.sub-chips::-webkit-scrollbar{display:none}
.chip{padding:10px 18px;border-radius:50px;border:1.5px solid var(--border);background:rgba(20,20,50,.6);font-size:.88rem;font-weight:600;white-space:nowrap;cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:6px}
.chip.active{border-color:var(--pri);background:rgba(124,92,252,.18);color:#fff;box-shadow:0 0 18px var(--priglow)}
.kcard{background:rgba(14,14,38,.75);border:1px solid var(--border);border-radius:var(--rad);padding:18px 18px;margin-bottom:12px;position:relative}
.kcard.important{border-left:4px solid var(--amb)}
.kcard.danger{border-left:4px solid var(--red)}
.kcard .ktag{display:inline-block;font-size:.72rem;padding:3px 10px;border-radius:50px;font-weight:600;margin-bottom:10px}
.kcard .ktag.kfact{background:rgba(124,92,252,.15);color:var(--prisoft)}
.kcard .ktag.ktip{background:rgba(251,191,36,.12);color:var(--amb)}
.kcard .ktag.kwarn{background:rgba(248,113,113,.1);color:var(--red)}
.kcard .ktag.kmnem{background:rgba(34,211,238,.1);color:var(--cyan)}
.kcard h3{font-size:1.05rem;font-weight:700;margin-bottom:10px;line-height:1.5}
.kcard p{font-size:.92rem;color:var(--txt2);line-height:1.9}
.kcard .khl{background:rgba(124,92,252,.12);padding:2px 6px;border-radius:4px;font-weight:600;color:var(--prisoft)}
.kcard .khl.red{background:var(--redsoft);color:var(--red)}
.kcard .khl.amber{background:var(--ambsoft);color:var(--amb)}
.kcard .khl.cyan{background:var(--cyansoft);color:var(--cyan)}
.kcard .khl.pink{background:var(--pinksoft);color:var(--pink)}
.flip-wrap{margin-bottom:14px;perspective:800px}
.flip{position:relative;transition:transform .5s cubic-bezier(.4,0,.2,1);transform-style:preserve-3d;cursor:pointer;min-height:150px;-webkit-tap-highlight-color:transparent}
.flip.flipped{transform:rotateY(180deg)}
.flip .front,.flip .back{backface-visibility:hidden;-webkit-backface-visibility:hidden;border-radius:var(--rad);padding:18px 18px;border:1.5px solid var(--border)}
.flip .front{background:rgba(14,14,38,.85);display:flex;flex-direction:column;justify-content:center}
.flip .back{position:absolute;inset:0;background:rgba(24,24,58,.92);border-color:var(--pri);transform:rotateY(180deg);overflow-y:auto;display:flex;align-items:center}
.flip .ftag{position:absolute;top:12px;right:12px;font-size:.7rem;padding:3px 10px;border-radius:50px;font-weight:600;z-index:2}
.flip .ftag.ft1{background:rgba(124,92,252,.15);color:var(--prisoft)}
.flip .ftag.ft2{background:var(--ambsoft);color:var(--amb)}
.flip .ftag.ft3{background:var(--redsoft);color:var(--red)}
.flip .fq{font-size:1.05rem;font-weight:600;line-height:1.7}
.flip .fhint{font-size:.78rem;color:var(--txt3);margin-top:10px;display:flex;align-items:center;gap:4px}
.flip .fa{font-size:.95rem;color:var(--txt2);line-height:1.85;padding:8px 0}
.flip .fa strong{color:var(--txt)}
.ctable{width:100%;border-collapse:collapse;margin:8px 0 14px;font-size:.8rem}
.ctable th{background:var(--surf3);padding:10px 10px;text-align:left;font-weight:700;color:var(--prisoft);font-size:.75rem;border-bottom:2px solid var(--pri)}
.ctable td{padding:10px 10px;border-bottom:1px solid var(--border);color:var(--txt2);line-height:1.6}
.ctable td:first-child{font-weight:600;color:var(--txt)}
.ctable .win{color:var(--grn);font-weight:700}
.ctable .lose{color:var(--red)}
.mbox{background:linear-gradient(135deg,rgba(34,211,238,.05),rgba(124,92,252,.05));border:1.5px solid rgba(34,211,238,.2);border-radius:var(--rads);padding:16px 18px;margin:12px 0}
.mbox .mhead{font-size:.84rem;font-weight:700;color:var(--cyan);margin-bottom:8px;display:flex;align-items:center;gap:6px}
.mbox p{font-size:.9rem;color:var(--txt2);line-height:1.8}
.miniq{background:rgba(14,14,38,.75);border:1px solid var(--border);border-radius:var(--rad);padding:16px 16px;margin-bottom:10px}
.miniq .mq{font-size:.95rem;font-weight:600;margin-bottom:12px;line-height:1.6}
.miniq .mo{display:flex;flex-direction:column;gap:8px}
.miniq .mobtn{padding:14px 16px;border-radius:12px;border:1.5px solid var(--border);background:rgba(20,20,50,.5);color:var(--txt2);cursor:pointer;font-size:.92rem;font-weight:500;transition:all .2s;text-align:left}
.miniq .mobtn:active:not(.mlocked){border-color:var(--pri);background:rgba(124,92,252,.15)}
.miniq .mobtn.mpick{border-color:var(--pri);background:rgba(124,92,252,.15);color:#fff}
.miniq .mobtn.mlocked{pointer-events:none}
.miniq .mobtn.mok{border-color:var(--grn)!important;background:var(--grnsoft)!important;color:var(--grn)!important}
.miniq .mobtn.mno{border-color:var(--red)!important;background:var(--redsoft)!important;color:var(--red)!important}
.miniq .mresult{margin-top:10px;padding:12px 14px;border-radius:10px;font-size:.84rem;display:none;line-height:1.7}
.miniq .mresult.show{display:block}
.miniq .mresult.mgood{background:var(--grnsoft);color:var(--grn)}
.miniq .mresult.mbad{background:var(--redsoft);color:var(--red)}
.sh{padding:8px 0;margin:18px 0 10px;display:flex;align-items:center;gap:8px;font-size:.85rem;font-weight:600;color:var(--txt3);border-bottom:1px solid rgba(40,40,90,.4);padding-bottom:8px}
.sh .shicon{font-size:1.2rem}
.bnav{position:fixed;bottom:0;left:0;right:0;z-index:200;background:rgba(8,8,26,.94);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border-top:1px solid var(--border);display:flex;padding:8px 8px var(--safe-bottom)}
.bnav .bnbtn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;padding:6px 4px;border-radius:12px;cursor:pointer;transition:all .2s;border:none;background:none;color:var(--txt3);font-size:.68rem;font-weight:500;font-family:var(--font)}
.bnav .bnbtn .bi{font-size:1.3rem;transition:transform .2s}
.bnav .bnbtn.active{color:var(--prisoft)}
.bnav .bnbtn.active .bi{transform:scale(1.15)}
.bnav .bnbtn:active{background:rgba(124,92,252,.1)}
.section-label{font-size:.78rem;color:var(--txt3);font-weight:600;text-transform:uppercase;letter-spacing:.05em;margin:16px 0 6px;padding:6px 0;display:flex;align-items:center;gap:6px}
.swipe-hint{text-align:center;padding:8px;font-size:.75rem;color:var(--txt3);animation:pulse2 2s ease-in-out infinite}
@keyframes pulse2{0%,100%{opacity:.4}50%{opacity:1}}
.diff{display:inline-block;font-size:.65rem;padding:2px 8px;border-radius:4px;font-weight:700;margin-left:4px}
.diff.easy{background:var(--grnsoft);color:var(--grn)}
.diff.med{background:var(--ambsoft);color:var(--amb)}
.diff.hard{background:var(--redsoft);color:var(--red)}
.coll-badge{display:inline-block;padding:3px 10px;border-radius:50px;font-size:.7rem;font-weight:600;margin:2px}
.coll-badge.hard-coll{background:var(--redsoft);color:var(--red)}
.coll-badge.trap-coll{background:var(--ambsoft);color:var(--amb)}
.ripple{position:absolute;border-radius:50%;background:rgba(124,92,252,.2);transform:scale(0);animation:ripple .6s ease-out;pointer-events:none}
@keyframes ripple{to{transform:scale(4);opacity:0}}
.fab{position:fixed;bottom:90px;right:16px;z-index:150;width:48px;height:48px;border-radius:50%;background:var(--pri);color:#fff;border:none;font-size:1.3rem;display:flex;align-items:center;justify-content:center;cursor:pointer;box-shadow:0 8px 28px var(--priglow);transition:all .2s}
.fab:active{transform:scale(.9);box-shadow:0 4px 14px var(--priglow)}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--border)}
</style>
</head>
<body>

<div class="topbar">
 <div class="logo">🏯 记忆宫殿</div>
 <div class="mode-row">
 <div class="mbtn active" onclick="setMode('learn')" id="mlearn" title="知识卡片">📖</div>
 <div class="mbtn" onclick="setMode('flip')" id="mflip" title="翻牌自检">🃏</div>
 <div class="mbtn" onclick="setMode('compare')" id="mcompare" title="对比">⚖️</div>
 <div class="mbtn" onclick="setMode('quiz')" id="mquiz" title="自测">🎮</div>
 <div class="mbtn" onclick="setMode('hard')" id="mhard" title="难点">🔥</div>
 </div>
</div>

<div class="content" id="content"></div>

<div class="bnav">
 <button class="bnbtn active" onclick="switchSub(0)" id="bn0"><span class="bi">🏗️</span>铸造</button>
 <button class="bnbtn" onclick="switchSub(1)" id="bn1"><span class="bi">⚙️</span>锻焊冲压</button>
 <button class="bnbtn" onclick="switchSub(2)" id="bn2"><span class="bi">🔩</span>机械加工</button>
</div>
<button class="fab" onclick="scrollToTop()" title="回顶部">⬆</button>

<script>
const SUBJECTS=[{
 id:'casting',icon:'🏗️',name:'铸造基础',
 cards:[
 {type:'fact',title:'铸造缺陷 · 四大类',body:'常见铸造缺陷：<span class="khl">缩孔与缩松</span>（凝固收缩）、<span class="khl">气孔与夹渣</span>（气体/杂质）、<span class="khl">浇不足与冷隔</span>（流动性差）、<span class="khl">热裂与冷裂</span>（应力）。<br><br>⚠️ <strong>注意</strong>：<span class="khl red">翻边、落料</span>是冲压工序，<strong>不是</strong>铸造缺陷！考试最爱挖这个坑。',important:true},
 {type:'fact',title:'铸造性能 · 两大指标',body:'合金铸造性能 = <span class="khl">流动性</span> + <span class="khl">收缩性</span>。<br><br>流动性 → 充型能力；收缩性 → 缩孔/缩松/变形/裂纹倾向。<br>口诀：<span class="khl cyan">"流得满，缩得少"</span>——流动性好铸型填得满，收缩小缺陷少。'},
 {type:'fact',title:'凝固方式 · 三种',body:'<span class="khl">逐层凝固</span>：纯金属、共晶合金 → 界面分明<br><span class="khl">糊状凝固</span>：宽结晶温度范围 → 固液共存糊状区<br><span class="khl">中间凝固</span>：介于两者之间<br><br>🔑 共晶成分→逐层凝固→<strong>流动性最好</strong>。',important:true},
 {type:'tip',title:'防缩孔缩松 · 顺序凝固',body:'<span class="khl amber">顺序凝固</span>：远离冒口先凝 → 近冒口后凝 → 缩孔集中到冒口切除。<br><br>vs <span class="khl">同时凝固</span>：用于防应力变形，不是防缩孔！<br>口诀：<span class="khl cyan">"缩孔找顺序，应力找同时"</span>'},
 {type:'fact',title:'铸铁石墨化 · 元素角色',body:'<strong>促进石墨化</strong>：<span class="khl">Si（硅）</span> ⭐最重要！<br><strong>阻碍石墨化</strong>：<span class="khl red">Mn（锰）、S（硫）</span><br><br>口诀：<span class="khl cyan">"硅促石墨锰阻之"</span>',important:true},
 {type:'fact',title:'铸铁石墨形态 · 四种',body:'<span class="khl">灰口铸铁</span>：<strong>片状</strong>石墨<br><span class="khl">可锻铸铁</span>：<strong>团絮状</strong>石墨（白口铸铁高温退火）<br><span class="khl">球墨铸铁</span>：<strong>球状</strong>石墨（Mg/Ce球化处理）<br><span class="khl">蠕墨铸铁</span>：<strong>蠕虫状</strong>石墨<br><br>口诀：<span class="khl cyan">"灰片可团球球蠕虫"</span>',important:true},
 {type:'tip',title:'冷变形 vs 热变形',body:'<span class="khl">冷变形</span>：再结晶温度<span class="khl red">以下</span> → <strong>加工硬化</strong>（强度↑塑性↓）<br><span class="khl">热变形</span>：再结晶温度<span class="khl">以上</span> → 可再结晶消除硬化<br><br>⚠️ 不是按室温，是按再结晶温度！'},
 {type:'warn',title:'塑性变形后组织变化',body:'室温塑性变形后：①晶粒<span class="khl">伸长</span>（纤维状）②晶格<span class="khl">扭曲</span>（位错↑）③产生<span class="khl">碎晶</span><br><br>⚠️ <span class="khl red">"晶粒长大"不是变形后的变化！</span>是再结晶退火后才发生的。高频陷阱！',danger:true},
 {type:'tip',title:'铸钢流动性 · 反直觉',body:'流动性排序：<span class="khl">灰铸铁 > 硅黄铜 > 铝硅合金 > 铸钢</span><br><br>💀 题目说"铸钢流动性最好"→立刻判错！铸钢流动性是<strong>最差</strong>的。',danger:true},
 {type:'mnem',title:'🔮 铸造终极口诀',body:'<strong>缺陷四类记心间</strong>：缩松气孔浇不足<br><strong>性能两字流动缩</strong>：流得满来缩得少<br><strong>共晶逐层流最好</strong>：恒温凝固无糊状<br><strong>顺序凝固防缩孔</strong>：远先近后冒口收<br><strong>硅促石墨锰阻之</strong>：灰片可团球蠕虫<br><strong>冷变硬化热消除</strong>：再结晶温是分界<br><strong>铸钢流动是最差</strong>：灰铁才是第一名'},
 ],
 flips:[
 {q:'合金铸造性能用哪两个指标衡量？',a:'<strong>流动性</strong>和<strong>收缩性</strong>。流动性决定充型能力，收缩性决定缩孔缩松和变形倾向。',tag:'ft1'},
 {q:'纯金属和共晶合金的凝固方式？',a:'<strong>逐层凝固</strong>。因为结晶温度范围窄，固-液界面分明。',tag:'ft1'},
 {q:'防缩孔缩松用什么原则？防应力呢？',a:'防缩孔→<strong>顺序凝固</strong>。防应力→<strong>同时凝固</strong>。',tag:'ft2'},
 {q:'促进铸铁石墨化最重要的元素？',a:'<strong>Si（硅）</strong>。Mn和S是阻碍石墨化的。',tag:'ft1'},
 {q:'可锻铸铁的石墨形态？怎么做的？',a:'<strong>团絮状</strong>。白口铸铁经<strong>高温退火</strong>后析出。注意"可锻"≠可以锻造！',tag:'ft2'},
 {q:'冷变形后强度和塑性怎么变？',a:'强度<strong>升高</strong>，塑性<strong>下降</strong>——<strong>加工硬化</strong>。',tag:'ft1'},
 {q:'再结晶温度以下的变形叫什么？',a:'<strong>冷变形</strong>（产生加工硬化）。以上叫<strong>热变形</strong>。',tag:'ft2'},
 {q:'哪种铸造合金流动性最差？',a:'<strong>铸钢</strong>流动性最差！灰铸铁最好。反直觉考点。',tag:'ft3'},
 ],
 compares:[
 {title:'顺序凝固 vs 同时凝固',headers:['','顺序凝固','同时凝固'],rows:[['目的','防缩孔缩松','防应力变形裂纹'],['方法','远离冒口先凝','各部位同时冷却'],['应用','厚大铸件','薄壁均匀件']]},
 {title:'冷变形 vs 热变形',headers:['','冷变形','热变形'],rows:[['温度','＜再结晶温度','＞再结晶温度'],['加工硬化','<span class="win">产生</span>','<span class="lose">不发生</span>'],['塑性变化','<span class="lose">下降</span>','<span class="win">保持较好</span>']]},
 {title:'四种铸铁石墨形态',headers:['铸铁类型','石墨形态','特征'],rows:[['灰口铸铁','片状','最常用，减振好'],['可锻铸铁','团絮状','白口铸铁高温退火'],['球墨铸铁','球状','Mg/Ce球化处理'],['蠕墨铸铁','蠕虫状','介于灰铁和球铁之间']]},
 ],
 quiz:[
 {q:'防止铸件缩孔缩松采用（）原则。',opts:['同时凝固','顺序凝固','逐层凝固','糊状凝固'],ans:1,exp:'✅ 顺序凝固 → 缩孔集中到冒口去除。'},
 {q:'下列不属于铸造缺陷的是？',opts:['缩孔','气孔','翻边','冷隔'],ans:2,exp:'✅ 翻边是冲压工序。'},
 {q:'促进铸铁石墨化的元素是？',opts:['Mn','S','Si','P'],ans:2,exp:'✅ Si（硅）是最重要的石墨化促进元素。'},
 {q:'共晶成分合金的凝固方式是？',opts:['糊状凝固','逐层凝固','中间凝固','体积凝固'],ans:1,exp:'✅ 共晶恒温凝固→逐层凝固→流动性最好。'},
 {q:'可锻铸铁的石墨形态是？',opts:['片状','球状','团絮状','蠕虫状'],ans:2,exp:'✅ 可锻铸铁→团絮状。灰口→片状，球墨→球状。'},
 {q:'冷变形后金属的塑性（）',opts:['升高','下降','不变','先升后降'],ans:1,exp:'✅ 加工硬化→强度↑塑性↓。'},
 {q:'再结晶温度以下的变形称（）',opts:['热变形','冷变形','温变形','弹性变形'],ans:1,exp:'✅ 低于再结晶温度→冷变形。'},
 {q:'流动最好的铸造合金是？',opts:['铸钢','灰铸铁','铝硅合金','硅黄铜'],ans:1,exp:'✅ 灰铸铁最好，铸钢最差！'},
 ],
 hard:[
 {q:'铸件壁间避免锐角连接的正确做法？',a:'改用<strong>圆角过渡</strong>，不是"先转角接头后再直角"。',trap:'混淆项常写"先转角后再直角"'},
